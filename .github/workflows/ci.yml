name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v4
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9  # v5
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --extra dev --frozen
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  typecheck:
    name: Type check (ty, baseline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v4
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9  # v5
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --extra dev --frozen
      - name: ty check, full package (informational)
        continue-on-error: true
        run: uv run ty check maverick_mcp
      - name: ty check, strict zone (services/ + domain/)
        run: uv run ty check maverick_mcp/services maverick_mcp/domain

  test-unit:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    env:
      MAVERICK_TEST_ENV: "true"
      TIINGO_API_KEY: "ci-dummy-key"
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v4
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9  # v5
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --extra dev --frozen
      - name: Run unit tests
        run: |
          COVERAGE_CORE=sysmon uv run pytest \
            -m "not integration and not slow and not external" \
            --maxfail=5 \
            --timeout=60
